<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meu Perfil - Amazônia em Casa</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .profile-container {
        max-width: 600px;
        margin: 2rem auto;
        padding: 2rem;
        background: white;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
      .profile-container h2 {
        color: #2d5a27;
        text-align: center;
        margin-bottom: 2rem;
      }
      .form-group {
        margin-bottom: 1.2rem;
      }
      .form-group label {
        display: block;
        margin-bottom: 0.3rem;
        font-weight: 500;
        color: #555;
      }
      .form-group input {
        width: 100%;
        padding: 0.8rem;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 1rem;
      }
      .form-group input:focus {
        outline: none;
        border-color: #2d5a27;
      }
      .btn-save {
        width: 100%;
        padding: 1rem;
        background: #2d5a27;
        color: white;
        border: none;
        border-radius: 10px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 1rem;
      }
      .btn-back {
        display: block;
        text-align: center;
        margin-top: 1rem;
        color: #999;
        text-decoration: none;
      }
      .success-message {
        background: #e8f5e9;
        color: #2d5a27;
        padding: 1rem;
        border-radius: 10px;
        text-align: center;
        margin-bottom: 1rem;
        display: none;
      }
      .error-message {
        background: #ffe0e0;
        color: #c62828;
        padding: 1rem;
        border-radius: 10px;
        text-align: center;
        margin-bottom: 1rem;
        display: none;
      }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  </head>
  <body>
    <header class="header">
      <nav class="nav-container">
        <div class="logo">
          <span style="font-size: 2rem">🌿</span>
          <h1>Amazônia em Casa</h1>
        </div>
        <div class="nav-actions">
          <a href="index.html" class="btn-login">🏠 Voltar para Loja</a>
        </div>
      </nav>
    </header>

    <div class="profile-container">
      <h2>👤 Meu Perfil</h2>
      <div class="success-message" id="successMessage">
        ✅ Perfil atualizado com sucesso!
      </div>
      <div class="error-message" id="errorMessage"></div>
      <form id="profileForm">
        <div class="form-group">
          <label>Nome Completo</label
          ><input type="text" id="profileName" required />
        </div>
        <div class="form-group">
          <label>CPF</label
          ><input
            type="text"
            id="profileCpf"
            placeholder="000.000.000-00"
            maxlength="14"
          />
        </div>
        <div class="form-group">
          <label>E-mail</label
          ><input
            type="email"
            id="profileEmail"
            disabled
            style="background: #f5f5f5; color: #999"
          /><small style="color: #999">O e-mail não pode ser alterado</small>
        </div>
        <div class="form-group">
          <label>Telefone</label
          ><input type="tel" id="profilePhone" maxlength="11" />
        </div>
        <div class="form-group">
          <label>CEP</label><input type="text" id="profileCep" maxlength="8" />
        </div>
        <div class="form-group">
          <label>Endereço</label><input type="text" id="profileAddress" />
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem">
          <div class="form-group">
            <label>Cidade</label><input type="text" id="profileCity" />
          </div>
          <div class="form-group">
            <label>Estado</label
            ><input type="text" id="profileState" maxlength="2" />
          </div>
        </div>
        <div class="form-group">
          <label>Nova Senha (deixe em branco)</label
          ><input type="password" id="profilePassword" minlength="6" />
        </div>
        <div class="form-group">
          <label>Confirmar Nova Senha</label
          ><input type="password" id="profileConfirmPassword" minlength="6" />
        </div>
        <button type="submit" class="btn-save">💾 Salvar Alterações</button>
      </form>
      <a href="index.html" class="btn-back">← Voltar para a Loja</a>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        var user = JSON.parse(localStorage.getItem("amazoniaLoggedUser"));
        if (!user) {
          alert("Faça login!");
          window.location.href = "cadastro.html";
          return;
        }
        document.getElementById("profileName").value = user.name || "";
        document.getElementById("profileCpf").value = user.cpf || "";
        document.getElementById("profileEmail").value = user.email || "";
        document.getElementById("profilePhone").value = user.phone || "";
        document.getElementById("profileCep").value = user.cep || "";
        document.getElementById("profileAddress").value = user.address || "";
        document.getElementById("profileCity").value = user.city || "";
        document.getElementById("profileState").value = user.state || "";
      });

      document
        .getElementById("profileForm")
        .addEventListener("submit", function (e) {
          e.preventDefault();
          var user = JSON.parse(localStorage.getItem("amazoniaLoggedUser"));
          if (!user) return;
          var newPassword = document.getElementById("profilePassword").value;
          var confirmPassword = document.getElementById(
            "profileConfirmPassword",
          ).value;
          if (newPassword && newPassword !== confirmPassword) {
            document.getElementById("errorMessage").textContent =
              "❌ As senhas não coincidem.";
            document.getElementById("errorMessage").style.display = "block";
            return;
          }
          user.name = document.getElementById("profileName").value;
          user.cpf = document.getElementById("profileCpf").value;
          user.phone = document.getElementById("profilePhone").value;
          user.cep = document.getElementById("profileCep").value;
          user.address = document.getElementById("profileAddress").value;
          user.city = document.getElementById("profileCity").value;
          user.state = document
            .getElementById("profileState")
            .value.toUpperCase();
          if (newPassword) user.password = newPassword;
          localStorage.setItem("amazoniaLoggedUser", JSON.stringify(user));
          var customers =
            JSON.parse(localStorage.getItem("amazoniaCustomers")) || [];
          var idx = customers.findIndex(function (c) {
            return c.email === user.email;
          });
          if (idx >= 0) {
            customers[idx] = user;
            localStorage.setItem(
              "amazoniaCustomers",
              JSON.stringify(customers),
            );
          }
          document.getElementById("successMessage").style.display = "block";
          document.getElementById("password").value = "";
          document.getElementById("confirmPassword").value = "";
        });
    </script>

    <script src="js/firebase-config.js"></script>
  </body>
</html>
