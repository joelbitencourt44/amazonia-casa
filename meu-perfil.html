<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Perfil - Amazônia em Casa</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .profile-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .profile-container h2 {
            color: #2d5a27;
            text-align: center;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 500;
            color: #555;
        }
        .form-group input {
            width: 100%;
            padding: 0.8rem;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
        }
        .form-group input:focus {
            outline: none;
            border-color: #2d5a27;
        }
        .btn-save {
            width: 100%;
            padding: 1rem;
            background: #2d5a27;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 1rem;
        }
        .btn-save:hover {
            background: #4a7c3f;
        }
        .btn-back {
            display: block;
            text-align: center;
            margin-top: 1rem;
            color: #999;
            text-decoration: none;
        }
        .btn-back:hover {
            color: #2d5a27;
        }
        .success-message {
            background: #e8f5e9;
            color: #2d5a27;
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 1rem;
            display: none;
        }
        .error-message {
            background: #ffe0e0;
            color: #c62828;
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 1rem;
            display: none;
        }
    </style>
</head>
<body>
    <header class="header">
        <nav class="nav-container">
            <div class="logo">
                <span style="font-size: 2rem;">🌿</span>
                <h1>Amazônia em Casa</h1>
            </div>
            <div class="nav-actions">
                <a href="index.html" class="btn-login">🏠 Voltar para Loja</a>
            </div>
        </nav>
    </header>

    <div class="profile-container">
        <h2>👤 Meu Perfil</h2>
        
        <div class="success-message" id="successMessage">✅ Perfil atualizado com sucesso!</div>
        <div class="error-message" id="errorMessage"></div>
        
        <form id="profileForm">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="profileName" required oninput="onlyLetters(this)">
            </div>
            <div class="form-group">
                <label>CPF</label>
                <input type="text" id="profileCpf" placeholder="000.000.000-00" maxlength="14" oninput="formatCPF(this)">
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="profileEmail" required disabled style="background:#f5f5f5;color:#999;">
                <small style="color:#999;">O e-mail não pode ser alterado</small>
            </div>
            <div class="form-group">
                <label>Telefone</label>
                <input type="tel" id="profilePhone" placeholder="(91) 99999-9999" oninput="onlyNumbers(this)" maxlength="11">
            </div>
            <div class="form-group">
                <label>CEP</label>
                <input type="text" id="profileCep" placeholder="66000000" oninput="onlyNumbers(this)" maxlength="8">
            </div>
            <div class="form-group">
                <label>Endereço</label>
                <input type="text" id="profileAddress" placeholder="Rua, número, bairro">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">
                <div class="form-group">
                    <label>Cidade</label>
                    <input type="text" id="profileCity" placeholder="Belém" oninput="onlyLetters(this)">
                </div>
                <div class="form-group">
                    <label>Estado</label>
                    <input type="text" id="profileState" placeholder="PA" oninput="onlyLetters(this)" maxlength="2">
                </div>
            </div>
            <div class="form-group">
                <label>Nova Senha (deixe em branco para não alterar)</label>
                <input type="password" id="profilePassword" minlength="6" placeholder="Mínimo 6 caracteres">
            </div>
            <div class="form-group">
                <label>Confirmar Nova Senha</label>
                <input type="password" id="profileConfirmPassword" minlength="6" placeholder="Repita a nova senha">
            </div>
            
            <button type="submit" class="btn-save">💾 Salvar Alterações</button>
        </form>
        
        <a href="index.html" class="btn-back">← Voltar para a Loja</a>
    </div>

    <script>
        // Carregar dados do usuário logado
        document.addEventListener('DOMContentLoaded', () => {
            const user = JSON.parse(localStorage.getItem('amazoniaLoggedUser'));
            
            if (!user) {
                alert('Faça login para acessar seu perfil.');
                window.location.href = 'cadastro.html';
                return;
            }
            
            // Preencher campos
            document.getElementById('profileName').value = user.name || '';
            document.getElementById('profileCpf').value = formatCPFDisplay(user.cpf || '');
            document.getElementById('profileEmail').value = user.email || '';
            document.getElementById('profilePhone').value = user.phone || '';
            document.getElementById('profileCep').value = user.cep || '';
            document.getElementById('profileAddress').value = user.address || '';
            document.getElementById('profileCity').value = user.city || '';
            document.getElementById('profileState').value = user.state || '';
        });
        
        // Formatar CPF para exibição
        function formatCPFDisplay(cpf) {
            if (!cpf) return '';
            cpf = cpf.replace(/\D/g, '');
            if (cpf.length === 11) {
                return cpf.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, '$1.$2.$3-$4');
            }
            return cpf;
        }
        
        // Funções de validação
        function onlyNumbers(input) {
            input.value = input.value.replace(/\D/g, '');
        }
        
        function onlyLetters(input) {
            input.value = input.value.replace(/[^a-zA-ZÀ-ÿ\s]/g, '');
        }
        
        function formatCPF(input) {
            let value = input.value.replace(/\D/g, '');
            if (value.length > 11) value = value.slice(0, 11);
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d)/, '$1.$2');
            value = value.replace(/(\d{3})(\d{1,2})$/, '$1-$2');
            input.value = value;
        }
        
        // Salvar alterações
        document.getElementById('profileForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const user = JSON.parse(localStorage.getItem('amazoniaLoggedUser'));
            if (!user) return;
            
            // Verificar senha
            const newPassword = document.getElementById('profilePassword').value;
            const confirmPassword = document.getElementById('profileConfirmPassword').value;
            
            if (newPassword && newPassword !== confirmPassword) {
                document.getElementById('errorMessage').textContent = '❌ As senhas não coincidem.';
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('successMessage').style.display = 'none';
                return;
            }
            
            // Atualizar dados
            user.name = document.getElementById('profileName').value;
            user.cpf = document.getElementById('profileCpf').value.replace(/\D/g, '');
            user.phone = document.getElementById('profilePhone').value;
            user.cep = document.getElementById('profileCep').value;
            user.address = document.getElementById('profileAddress').value;
            user.city = document.getElementById('profileCity').value;
            user.state = document.getElementById('profileState').value.toUpperCase();
            
            if (newPassword) {
                user.password = newPassword;
            }
            
            // Salvar no localStorage
            localStorage.setItem('amazoniaLoggedUser', JSON.stringify(user));
            
            // Atualizar também na lista de clientes
            const customers = JSON.parse(localStorage.getItem('amazoniaCustomers')) || [];
            const customerIndex = customers.findIndex(c => c.email === user.email);
            if (customerIndex >= 0) {
                customers[customerIndex] = user;
                localStorage.setItem('amazoniaCustomers', JSON.stringify(customers));
            }
            
            // Mostrar mensagem de sucesso
            document.getElementById('successMessage').style.display = 'block';
            document.getElementById('errorMessage').style.display = 'none';
            
            // Limpar campos de senha
            document.getElementById('profilePassword').value = '';
            document.getElementById('profileConfirmPassword').value = '';
            
            // Rolar para o topo
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>
</body>
</html>
