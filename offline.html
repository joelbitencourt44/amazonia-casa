<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline</title>
    <style>
      body {
        font-family: sans-serif;
        background: #f4f1ea;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        text-align: center;
      }
      .offline-box {
        background: white;
        padding: 3rem;
        border-radius: 15px;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
      h1 {
        color: #2d5a27;
      }
      button {
        background: #2d5a27;
        color: white;
        border: none;
        padding: 1rem 2rem;
        border-radius: 25px;
        cursor: pointer;
        font-size: 1rem;
      }
    </style>
  </head>
  <body>
    <div class="offline-box">
      <h1>🌿📴 Você está offline</h1>
      <p>O catálogo continua disponível!</p>
      <button onclick="window.location.reload()">Tentar novamente</button>
    </div>
  </body>
</html>
