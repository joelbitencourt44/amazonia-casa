<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meus Pedidos - Amazônia em Casa</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .orders-container {
        max-width: 900px;
        margin: 2rem auto;
        padding: 2rem;
      }
      .orders-container h2 {
        color: #2d5a27;
        text-align: center;
        margin-bottom: 2rem;
      }
      .order-card {
        background: white;
        border-radius: 15px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      }
      .order-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid #eee;
      }
      .order-id {
        font-weight: bold;
        color: #2d5a27;
        font-size: 1.2rem;
      }
      .order-date {
        color: #999;
        font-size: 0.9rem;
      }
      .order-status {
        padding: 0.3rem 1rem;
        border-radius: 20px;
        font-size: 0.9rem;
      }
      .status-pending {
        background: #fff3e0;
        color: #e65100;
      }
      .status-confirmed {
        background: #e3f2fd;
        color: #1565c0;
      }
      .status-shipped {
        background: #e8f5e9;
        color: #2d5a27;
      }
      .status-delivered {
        background: #e8f5e9;
        color: #2d5a27;
      }
      .status-cancelled {
        background: #fce4ec;
        color: #c62828;
      }
      .order-items {
        margin: 1rem 0;
      }
      .order-item {
        display: flex;
        justify-content: space-between;
        padding: 0.5rem 0;
      }
      .order-total {
        font-weight: bold;
        font-size: 1.1rem;
        text-align: right;
        margin-top: 1rem;
        padding-top: 1rem;
        border-top: 2px solid #eee;
      }
      .no-orders {
        text-align: center;
        padding: 3rem;
        color: #999;
      }
      .btn-back {
        display: inline-block;
        margin-top: 1rem;
        background: #2d5a27;
        color: white;
        padding: 0.8rem 2rem;
        border-radius: 25px;
        text-decoration: none;
      }
    </style>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  </head>
  <body>
    <header class="header">
      <nav class="nav-container">
        <div class="logo">
          <span style="font-size: 2rem">🌿</span>
          <h1>Amazônia em Casa</h1>
        </div>
        <div class="nav-actions">
          <a href="index.html" class="btn-login">🏠 Voltar para Loja</a>
        </div>
      </nav>
    </header>

    <div class="orders-container">
      <h2>📋 Meus Pedidos</h2>
      <div id="ordersList"></div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", async function () {
        var user = JSON.parse(localStorage.getItem("amazoniaLoggedUser"));
        if (!user) {
          document.getElementById("ordersList").innerHTML =
            '<div class="no-orders"><span>🔒</span><p>Faça login para ver seus pedidos.</p><a href="cadastro.html" class="btn-back">Entrar / Cadastrar</a></div>';
          return;
        }

        var myOrders = [];

        // Buscar do Firebase primeiro
        if (typeof db !== "undefined") {
          try {
            var snap = await db
              .collection("orders")
              .where("customer.email", "==", user.email)
              .orderBy("date", "desc")
              .get();
            snap.forEach(function (doc) {
              myOrders.push({ id: doc.id, ...doc.data() });
            });
          } catch (e) {
            console.log("Firebase offline, usando localStorage");
          }
        }

        // Se não achou no Firebase, buscar do localStorage
        if (myOrders.length === 0) {
          var allOrders =
            JSON.parse(localStorage.getItem("amazoniaOrders")) || [];
          myOrders = allOrders
            .filter(function (o) {
              return o.customer?.email === user.email;
            })
            .reverse();
        }

        if (myOrders.length === 0) {
          document.getElementById("ordersList").innerHTML =
            '<div class="no-orders"><span>📦</span><p>Você ainda não tem pedidos.</p><a href="index.html" class="btn-back">Fazer primeira compra</a></div>';
          return;
        }

        function getStatusName(s) {
          var n = {
            pending: "⏳ Pendente",
            confirmed: "✅ Confirmado",
            shipped: "🚚 Em Entrega",
            delivered: "📦 Entregue",
            cancelled: "❌ Cancelado",
          };
          return n[s] || s;
        }

        document.getElementById("ordersList").innerHTML = myOrders
          .map(function (order) {
            return (
              '<div class="order-card">' +
              '<div class="order-header"><div><span class="order-id">Pedido #' +
              (order.orderNumber || order.id) +
              '</span><span class="order-date"> ' +
              new Date(order.date).toLocaleDateString("pt-BR") +
              "</span></div>" +
              '<span class="order-status status-' +
              (order.status || "pending") +
              '">' +
              getStatusName(order.status || "pending") +
              "</span></div>" +
              '<div class="order-items">' +
              (order.items || [])
                .map(function (item) {
                  return (
                    '<div class="order-item"><span>' +
                    item.name +
                    " (" +
                    item.quantity +
                    "x)</span><span>R$ " +
                    (item.price * item.quantity).toFixed(2) +
                    "</span></div>"
                  );
                })
                .join("") +
              "</div>" +
              '<div class="order-total">Total: R$ ' +
              (order.total || 0).toFixed(2) +
              "</div>" +
              '<div style="margin-top:0.5rem;font-size:0.9rem;color:#999;">💳 ' +
              (order.paymentMethod || "Pix") +
              "</div>" +
              (order.status === "pending" || order.status === "confirmed"
                ? '<div style="margin-top:1rem;text-align:right;"><button onclick="cancelOrder(\'' +
                  order.id +
                  '\')" style="background:#c62828;color:white;border:none;padding:0.5rem 1.5rem;border-radius:25px;cursor:pointer;">❌ Cancelar</button></div>'
                : "") +
              "</div>"
            );
          })
          .join("");
      });

      async function cancelOrder(id) {
        if (confirm("Cancelar este pedido?")) {
          // Cancelar no Firebase
          if (typeof db !== "undefined") {
            try {
              await db
                .collection("orders")
                .doc(id.toString())
                .update({
                  status: "cancelled",
                  cancelledAt: new Date().toISOString(),
                  cancelledBy: "cliente",
                });
            } catch (e) {}
          }
          // Cancelar no localStorage
          var orders = JSON.parse(localStorage.getItem("amazoniaOrders")) || [];
          var order = orders.find(function (o) {
            return o.id == id || o.orderNumber == id;
          });
          if (order) {
            order.status = "cancelled";
            localStorage.setItem("amazoniaOrders", JSON.stringify(orders));
          }
          alert("✅ Cancelado!");
          location.reload();
        }
      }
    </script>

    <script src="js/firebase-config.js"></script>
  </body>
</html>
