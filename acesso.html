<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Área Restrita - Amazônia em Casa</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .access-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1a1a2e, #2d5a27);
      }
      .access-card {
        background: white;
        padding: 3rem;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      .access-card h2 {
        color: #2d5a27;
        margin-bottom: 1rem;
      }
      .access-card p {
        color: #666;
        margin-bottom: 2rem;
      }
      .btn-access {
        display: inline-block;
        padding: 1rem 2rem;
        background: #2d5a27;
        color: white;
        border-radius: 10px;
        text-decoration: none;
        font-weight: bold;
        margin: 0.5rem;
      }
      .btn-access:hover {
        background: #4a7c3f;
      }
    </style>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  </head>
  <body>
    <div class="access-container">
      <div class="access-card">
        <span style="font-size: 4rem">🔐</span>
        <h2>Área Restrita</h2>
        <p>Acesso exclusivo para administradores da loja.</p>
        <a href="admin-login.html" class="btn-access">👤 Entrar no Painel</a>
        <br /><br />
        <a href="index.html" style="color: #999; text-decoration: none"
          >← Voltar para Loja</a
        >
      </div>
    </div>
    <script src="js/firebase-config.js"></script>
  </body>
</html>
