<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login / Cadastro</title>
    <link rel="stylesheet" href="css/style.css" />
    <style>
      .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #1a1a2e, #2d5a27);
        padding: 2rem;
      }
      .auth-card {
        background: #fff;
        border-radius: 20px;
        padding: 2.5rem;
        max-width: 450px;
        width: 100%;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      }
      .auth-tabs {
        display: flex;
        margin-bottom: 2rem;
        border-bottom: 2px solid #eee;
      }
      .auth-tab {
        flex: 1;
        padding: 1rem;
        text-align: center;
        cursor: pointer;
        font-weight: 600;
        color: #999;
        border-bottom: 3px solid transparent;
      }
      .auth-tab.active {
        color: #2d5a27;
        border-bottom-color: #2d5a27;
      }
      .auth-form {
        display: none;
      }
      .auth-form.active {
        display: block;
      }
      .auth-form .form-group {
        margin-bottom: 1rem;
      }
      .auth-form label {
        display: block;
        margin-bottom: 0.3rem;
        font-weight: 500;
      }
      .auth-form input {
        width: 100%;
        padding: 0.8rem;
        border: 2px solid #e0e0e0;
        border-radius: 10px;
        font-size: 1rem;
      }
      .btn-auth {
        width: 100%;
        padding: 1rem;
        background: #2d5a27;
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 1.1rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 1rem;
      }
      .msg {
        padding: 0.8rem;
        border-radius: 8px;
        margin-bottom: 1rem;
        display: none;
      }
      .msg-erro {
        background: #ffe0e0;
        color: #c62828;
      }
      .msg-ok {
        background: #e8f5e9;
        color: #2d5a27;
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-card">
        <div style="text-align: center; margin-bottom: 1.5rem">
          <h2 style="color: #2d5a27">🌿 Amazônia em Casa</h2>
        </div>
        <div class="msg msg-erro" id="errorMessage"></div>
        <div class="msg msg-ok" id="successMessage"></div>
        <div class="auth-tabs">
          <div class="auth-tab active" data-tab="login">Entrar</div>
          <div class="auth-tab" data-tab="register">Criar Conta</div>
        </div>
        <form class="auth-form active" id="loginForm">
          <div class="form-group">
            <label>E-mail</label><input type="email" id="loginEmail" required />
          </div>
          <div class="form-group">
            <label>Senha</label
            ><input type="password" id="loginPassword" required />
          </div>
          <button type="submit" class="btn-auth">Entrar</button>
        </form>
     
      <form class="auth-form" id="registerForm">
        <div class="form-group">
          <label>Nome Completo *</label>
          <input
            type="text"
            id="regName"
            required
            placeholder="Seu nome completo"
            oninput="onlyLetters(this)"
          />
        </div>
        <div class="form-group">
          <label>CPF *</label>
          <input
            type="text"
            id="regCpf"
            required
            placeholder="000.000.000-00"
            maxlength="14"
            oninput="formatCPF(this)"
          />
        </div>
        <div class="form-group">
          <label>E-mail *</label>
          <input
            type="email"
            id="regEmail"
            required
            placeholder="seu@email.com"
          />
        </div>
        <div class="form-group">
          <label>Telefone *</label>
          <input
            type="tel"
            id="regPhone"
            required
            placeholder="(91) 99999-9999"
            oninput="onlyNumbers(this)"
            maxlength="11"
          />
        </div>
        <div class="form-group">
          <label>CEP</label>
          <input
            type="text"
            id="regCep"
            placeholder="66000000"
            oninput="onlyNumbers(this)"
            maxlength="8"
          />
        </div>
        <div class="form-group">
          <label>Endereço</label>
          <input
            type="text"
            id="regAddress"
            placeholder="Rua, número, bairro"
          />
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem">
          <div class="form-group">
            <label>Cidade</label>
            <input
              type="text"
              id="regCity"
              placeholder="Belém"
              oninput="onlyLetters(this)"
            />
          </div>
          <div class="form-group">
            <label>Estado</label>
            <input
              type="text"
              id="regState"
              placeholder="PA"
              oninput="onlyLetters(this)"
              maxlength="2"
            />
          </div>
        </div>
        <div class="form-group">
          <label>Senha *</label>
          <input
            type="password"
            id="regPassword"
            required
            minlength="6"
            placeholder="Mínimo 6 caracteres"
          />
        </div>
        <div class="form-group">
          <label>Confirmar Senha *</label>
          <input
            type="password"
            id="regConfirmPassword"
            required
            minlength="6"
            placeholder="Repita a senha"
          />
        </div>
        <button type="submit" class="btn-auth">Criar Conta</button>
      </form>
   
    <script>
      document.querySelectorAll(".auth-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document
            .querySelectorAll(".auth-tab")
            .forEach((t) => t.classList.remove("active"));
          document
            .querySelectorAll(".auth-form")
            .forEach((f) => f.classList.remove("active"));
          tab.classList.add("active");
          document
            .getElementById(tab.dataset.tab + "Form")
            .classList.add("active");
        });
      });
      document.getElementById("loginForm").addEventListener("submit", (e) => {
        e.preventDefault();
        const email = document.getElementById("loginEmail").value;
        const password = document.getElementById("loginPassword").value;
        const users =
          JSON.parse(localStorage.getItem("amazoniaCustomers")) || [];
        const user = users.find(
          (u) => u.email === email && u.password === password,
        );
        if (user) {
          localStorage.setItem("amazoniaLoggedUser", JSON.stringify(user));
          document.getElementById("successMessage").textContent =
            "✅ Login OK! Redirecionando...";
          document.getElementById("successMessage").style.display = "block";
          setTimeout(() => (window.location.href = "index.html"), 1500);
        } else {
          document.getElementById("errorMessage").textContent =
            "❌ E-mail ou senha incorretos.";
          document.getElementById("errorMessage").style.display = "block";
        }
      });
      document
        .getElementById("registerForm")
        .addEventListener("submit", (e) => {
          e.preventDefault();
          const p1 = document.getElementById("regPassword").value;
          const p2 = document.getElementById("regConfirmPassword").value;
          if (p1 !== p2) {
            document.getElementById("errorMessage").textContent =
              "❌ Senhas não coincidem.";
            document.getElementById("errorMessage").style.display = "block";
            return;
          }
          const users =
            JSON.parse(localStorage.getItem("amazoniaCustomers")) || [];
          if (
            users.find(
              (u) => u.email === document.getElementById("regEmail").value,
            )
          ) {
            document.getElementById("errorMessage").textContent =
              "❌ E-mail já cadastrado.";
            document.getElementById("errorMessage").style.display = "block";
            return;
          }
          const newUser = {
            id: Date.now(),
            name: document.getElementById("regName").value,
            email: document.getElementById("regEmail").value,
            phone: document.getElementById("regPhone").value,
            cpf: document.getElementById("regCpf").value,
            cep: document.getElementById("regCep").value,
            address: document.getElementById("regAddress").value,
            city: document.getElementById("regCity").value,
            state: document.getElementById("regState").value,
            password: p1,
            createdAt: new Date().toISOString(),
          };
          users.push(newUser);
          localStorage.setItem("amazoniaCustomers", JSON.stringify(users));
          localStorage.setItem("amazoniaLoggedUser", JSON.stringify(newUser));
          document.getElementById("successMessage").textContent =
            "✅ Conta criada! Redirecionando...";
          document.getElementById("successMessage").style.display = "block";
          setTimeout(() => (window.location.href = "index.html"), 1500);
        });
      function formatCPF(input) {
        let value = input.value.replace(/\D/g, "");
        if (value.length > 11) value = value.slice(0, 11);
        value = value.replace(/(\d{3})(\d)/, "$1.$2");
        value = value.replace(/(\d{3})(\d)/, "$1.$2");
        value = value.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
        input.value = value;
      }

      // Permite apenas números (CPF, telefone, CEP)
      function onlyNumbers(input) {
        input.value = input.value.replace(/\D/g, "");
      }

      // Permite apenas letras e espaços (nome, cidade, estado)
      function onlyLetters(input) {
        input.value = input.value.replace(/[^a-zA-ZÀ-ÿ\s]/g, "");
      }
    
    </script>
  </body>
</html>
